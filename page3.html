<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>刑事鑑識中心-通訊網</title>
    <style>
        :root {
            --primary-green: #4ecca3;
            --dark-bg: #1a1a2e;
            --card-bg: #16213e;
            --accent-blue: #0f3460;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--dark-bg);
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .hidden { display: none !important; }

        h2 { color: var(--primary-green); margin-bottom: 20px; }

        /* 分組按鈕樣式 */
        .group-btn {
            background: var(--accent-blue);
            color: white;
            width: 100%;
            padding: 20px;
            margin: 10px 0;
            border: 1px solid #533483;
            border-radius: 12px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* 聯絡人卡片樣式 */
        .contact-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid var(--primary-green);
        }

        .info { text-align: left; }
        .name { font-size: 20px; font-weight: bold; display: block; }
        .title { font-size: 14px; color: #999; }

        .call-btn {
            background: var(--primary-green);
            color: var(--dark-bg);
            padding: 12px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
        }

        /* 返回按鈕 */
        .back-btn {
            background: #666;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            margin-bottom: 20px;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>

    function showGroup(groupName) {
        const menu = document.getElementById('group-menu');
        const listView = document.getElementById('contact-list-view');
        const container = document.getElementById('contacts-container');
        const title = document.getElementById('selected-group-name');

        // 切換顯示房間
        menu.classList.add('hidden');
        listView.classList.remove('hidden');
        title.innerText = groupName;

        // 過濾並產生卡片
        container.innerHTML = '';
        const filtered = contactData.filter(c => c.dept === groupName);

        filtered.forEach(c => {
            const card = document.createElement('div');
            card.className = 'contact-card';
            card.innerHTML = `
                <div class="info">
                    <span class="name">${c.name}</span>
                    <span class="title">${c.title}</span>
                </div>
                <a href="tel:${c.ext}" class="call-btn">📞 ${c.ext}</a>
            `;
            container.appendChild(card);
        });
    }

    function goBack() {
        document.getElementById('group-menu').classList.remove('hidden');
        document.getElementById('contact-list-view').classList.add('hidden');
    }
