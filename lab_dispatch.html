<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>毒品送驗分工查詢</title>
  <style>
  :root {
    --bg: #eef3f8;
    --panel: #f7fafc;
    --card: #ffffff;
    --line: #d7dee8;
    --line-soft: #e7edf4;

    --text: #31465f;
    --muted: #7f90a6;

    --primary: #8fa9c8;
    --primary-deep: #6f8fb6;
    --primary-soft: #dfe8f3;

    --result-bg: #edf4f8;
    --result-line: #d6e2ea;

    --note-bg: #eef5ef;
    --note-line: #d7e5d8;

    --radius-xl: 18px;
    --radius-lg: 14px;
    --radius-md: 12px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  .page {
    max-width: 980px;
    margin: 0 auto;
    padding: 14px;
  }

  .header {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius-xl);
    padding: 16px;
    margin-bottom: 14px;
  }

  .header h1 {
    margin: 0;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: .5px;
    color: #2c3f57;
  }

  .header .actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 12px;
  }

  .btn-link,
  .btn-reset {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 44px;
    padding: 0 16px;
    border-radius: var(--radius-md);
    text-decoration: none;
    font-size: 14px;
    font-weight: 700;
    transition: .18s ease;
  }

  .btn-link {
    background: #2b5797;
    color: #fff;
    border: 1px solid #2b5797;
  }

  .btn-link:hover {
    background: #244a80;
    border-color: #244a80;
  }

  .btn-reset {
    background: #fff;
    color: #506781;
    border: 1px solid #cfd8e3;
    cursor: pointer;
  }

  .btn-reset:hover {
    background: #f6f9fc;
  }

  .layout {
    display: grid;
    grid-template-columns: 1.12fr 0.88fr;
    gap: 14px;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius-xl);
    padding: 16px;
  }

  .step + .step {
    margin-top: 18px;
    padding-top: 18px;
    border-top: 1px dashed var(--line);
  }

  .step-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .step-no {
    width: 28px;
    height: 28px;
    border-radius: 999px;
    background: var(--primary-soft);
    color: var(--primary-deep);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 800;
    flex: 0 0 auto;
  }

  .step-title {
    font-size: 17px;
    font-weight: 800;
    color: #30475f;
  }

  .option-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }

  .option-btn {
  width: 100%;
  min-height: 52px;
  border-radius: var(--radius-md);
  border: 1px solid #ccd6e2;
  background: #ffffff;
  color: #40566f;
  padding: 12px 14px;
  font-size: 15px;
  font-weight: 700;
  line-height: 1.4;
  cursor: pointer;
  transition: .18s ease;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.option-btn:hover {
  background: #f8fbfd;
  border-color: #b9c8d8;
}

.option-btn.active {
  background: #9db3cd;
  color: #23374d;
  border-color: #9db3cd;
}

.option-main {
  display: block;
}

.option-sub {
  display: block;
  margin-top: 4px;
  font-size: 12px;
  font-weight: 500;
  line-height: 1.35;
  color: #7f90a6;
}

.option-btn.active .option-sub {
  color: #eef4fb;
}

  .empty {
    padding: 12px 14px;
    border-radius: var(--radius-md);
    background: #f3f6f9;
    border: 1px solid var(--line-soft);
    color: var(--muted);
    font-size: 14px;
  }

  .result {
    background: var(--result-bg);
    border: 1px solid var(--result-line);
    border-radius: 16px;
    padding: 16px;
  }

  .result-unit {
    font-size: 26px;
    font-weight: 900;
    color: #35516f;
    line-height: 1.3;
    margin-bottom: 14px;
    word-break: break-word;
  }

  .result-row {
    display: grid;
    grid-template-columns: 72px 1fr;
    gap: 8px 10px;
    font-size: 14px;
    line-height: 1.7;
  }

  .result-row .key {
    color: #73859a;
    font-weight: 700;
  }

  .note {
    margin-top: 14px;
    padding: 12px 14px;
    border-radius: 14px;
    background: var(--note-bg);
    border: 1px solid var(--note-line);
    color: #5d7364;
    font-size: 13px;
    line-height: 1.7;
  }

  @media (max-width: 860px) {
    .layout {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 640px) {
    .page {
      padding: 10px;
    }

    .header,
    .card {
      padding: 14px;
      border-radius: 16px;
    }

    .header h1 {
      font-size: 20px;
    }

    .option-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
    }

    .result-unit {
      font-size: 22px;
    }

    .result-row {
      grid-template-columns: 64px 1fr;
      font-size: 13px;
    }

    .header .actions {
      flex-direction: column;
    }

    .btn-link,
    .btn-reset {
      width: 100%;
    }
  }
</style>
</head>
<body>
  <div class="page">
    <section class="header">
      <h1>毒品送驗分工查詢</h1>
      <div class="actions">
        <a class="btn-link" href="./1140324修正分工表.jpg" download>下載毒品分工表</a>
        <button class="btn-reset" id="resetBtn" type="button">重新選擇</button>
      </div>
    </section>

    <section class="layout">
      <div class="card">
        <div class="step">
          <div class="step-head">
            <div class="step-no">1</div>
            <div class="step-title">毒品級別</div>
          </div>
          <div id="levelOptions" class="option-grid"></div>
        </div>

        <div class="step">
          <div class="step-head">
            <div class="step-no">2</div>
            <div class="step-title">種類</div>
          </div>
          <div id="typeOptions"></div>
        </div>

        <div class="step">
          <div class="step-head">
            <div class="step-no">3</div>
            <div class="step-title">重量</div>
          </div>
          <div id="weightOptions"></div>
        </div>
      </div>

      <div class="card">
        <div id="resultBox" class="result">
          <div class="empty">請依序選擇毒品級別、種類、重量。</div>
        </div>
        <div class="note">本結果依目前上傳的毒品分工表判斷，仍以最新正式規定為準。</div>
      </div>
    </section>
  </div>

  <script>
    const rules = [
      { level: '第一級', type: '不分種類(常見海洛因、嗎啡、鴉片、古柯鹼等)', weight: '未滿1公克', unit: '欣生', note: '' },
      { level: '第一級', type: '不分種類(常見海洛因、嗎啡、鴉片、古柯鹼等)', weight: '1公克以上', unit: '法務部調查局', note: '' },

      { level: '第二級', type: '不分種類(非屬甲基安非他命、罌粟類、古柯類、大麻類)', weight: '未滿1公克', unit: '欣生、草屯', note: '' },
      { level: '第二級', type: '甲基安非他命', weight: '未滿1公克', unit: '欣生、草屯', note: '' },
      { level: '第二級', type: '罌粟類、古柯類、大麻類', weight: '未滿1公克', unit: '欣生、草屯', note: '' },

      { level: '第二級', type: '不分種類(非屬甲基安非他命、罌粟類、古柯類、大麻類)', weight: '1公克以上未滿10公克', unit: '欣生、草屯、食藥署', note: '' },
      { level: '第二級', type: '甲基安非他命', weight: '1公克以上未滿10公克', unit: '欣生、草屯、食藥署', note: '' },
      { level: '第二級', type: '罌粟類、古柯類、大麻類', weight: '1公克以上未滿10公克', unit: '欣生、草屯、食藥署', note: '' },


      { level: '第二級', type: '甲基安非他命', weight: '10公克以上未滿100公克', unit: '欣生、草屯', note: '' },
      { level: '第二級', type: '甲基安非他命', weight: '100公克以上', unit: '刑事局、海巡署', note: '海巡署查扣證物由該單位鑑驗' },

      { level: '第二級', type: '罌粟類、古柯類、大麻類', weight: '10公克以上', unit: '調查局', note: '' },
      { level: '第二級', type: '不分種類(非屬甲基安非他命、罌粟類、古柯類、大麻類)', weight: '10公克以上', unit: '警政署', note: '' },

      { level: '第三級', type: '不分種類', weight: '未滿1公克', unit: '欣生、草屯', note: '' },
      { level: '第三級', type: 'K他命、硝甲西泮', weight: '未滿1公克', unit: '欣生、草屯', note: '' },
      { level: '第三級', type: '不分種類', weight: '1公克以上未滿20公克', unit: '欣生、草屯、食藥署', note: '' },
      { level: '第三級', type: 'K他命、硝甲西泮', weight: '1公克以上未滿20公克', unit: '欣生、草屯、食藥署', note: '' },
      { level: '第三級', type: '不分種類', weight: '20公克以上', unit: '刑事局', note: '' },
      { level: '第三級', type: 'K他命、硝甲西泮', weight: '20公克以上未滿100公克', unit: '欣生、草屯', note: '' },
      { level: '第三級', type: 'K他命、硝甲西泮', weight: '100公克以上', unit: '刑事局', note: '' },
      { level: '第四級', type: '不分種類', weight: '未滿1公克', unit: '欣生、草屯', note: '' },
      { level: '第四級', type: '不分種類', weight: '1公克以上未滿20公克', unit: '欣生、草屯、食藥署', note: '' },
      { level: '第四級', type: '不分種類', weight: '20公克以上', unit: '刑事局', note: '' },
      { level: '混合式毒品', type: '不分種類', weight: '未滿500包瓶罐', unit: '欣生、草屯(需抽樣)', note: '' },
      { level: '混合式毒品', type: '不分種類', weight: '500包瓶罐以上', unit: '刑事局(需抽樣)', note: '' }
    ];

    const state = { level: '', type: '', weight: '' };

    const levelOptions = document.getElementById('levelOptions');
    const typeOptions = document.getElementById('typeOptions');
    const weightOptions = document.getElementById('weightOptions');
    const resultBox = document.getElementById('resultBox');
    const resetBtn = document.getElementById('resetBtn');

    const unique = arr => [...new Set(arr)];
    const escapeHtml = (str) => String(str)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');

    function renderButtonGroup(container, items, activeValue, onClick) {
  if (!items.length) {
    container.innerHTML = '<div class="empty">目前沒有可選項目。</div>';
    return;
  }

  const subTextMap = {
  '第一級': '（常見海洛因、嗎啡等）',
  '第二級': '（常見安非他命、大麻等）',
  '第三級': '（常見K他命、硝甲西泮等）',
  '混合式毒品': '(咖啡包、神仙水、菸彈、彩虹煙等)'
};

  container.innerHTML = `
    <div class="option-grid">
      ${items.map(item => {
        const subText = subTextMap[item] || '';

        return `
          <button
            type="button"
            class="option-btn ${item === activeValue ? 'active' : ''}"
            data-value="${escapeHtml(item)}"
          >
            <span class="option-main">${escapeHtml(item)}</span>
            ${subText ? `<small class="option-sub">${escapeHtml(subText)}</small>` : ''}
          </button>
        `;
      }).join('')}
    </div>
  `;

  container.querySelectorAll('.option-btn').forEach(btn => {
    btn.addEventListener('click', () => onClick(btn.dataset.value));
  });
}

    function renderLevels() {
      const levels = unique(rules.map(r => r.level));
      renderButtonGroup(levelOptions, levels, state.level, (value) => {
        state.level = value;
        state.type = '';
        state.weight = '';
        renderAll();
      });
    }

    function renderTypes() {
      if (!state.level) {
        typeOptions.innerHTML = '<div class="empty">請先選擇毒品級別。</div>';
        return;
      }
      const types = unique(rules.filter(r => r.level === state.level).map(r => r.type));
      renderButtonGroup(typeOptions, types, state.type, (value) => {
        state.type = value;
        state.weight = '';
        renderAll();
      });
    }

    function renderWeights() {
      if (!state.level || !state.type) {
        weightOptions.innerHTML = '<div class="empty">請先選擇種類。</div>';
        return;
      }
      const weights = unique(rules.filter(r => r.level === state.level && r.type === state.type).map(r => r.weight));
      renderButtonGroup(weightOptions, weights, state.weight, (value) => {
        state.weight = value;
        renderAll();
      });
    }

    function renderResult() {
      if (!state.level || !state.type || !state.weight) {
        resultBox.innerHTML = '<div class="empty">請依序選擇毒品級別、種類、重量。</div>';
        return;
      }

      const match = rules.find(r => r.level === state.level && r.type === state.type && r.weight === state.weight);

      if (!match) {
        resultBox.innerHTML = '<div class="empty">查無對應結果。</div>';
        return;
      }

      resultBox.innerHTML = `
        <div class="result-unit">${escapeHtml(match.unit)}</div>
        <div class="result-row">
          <div class="key">級別</div><div>${escapeHtml(match.level)}</div>
          <div class="key">種類</div><div>${escapeHtml(match.type)}</div>
          <div class="key">重量</div><div>${escapeHtml(match.weight)}</div>
          <div class="key">依據</div><div>${escapeHtml(match.level)} → ${escapeHtml(match.type)} → ${escapeHtml(match.weight)}</div>
          <div class="key">備註</div><div>${match.note ? escapeHtml(match.note) : '—'}</div>
        </div>
      `;
    }

    function renderAll() {
      renderLevels();
      renderTypes();
      renderWeights();
      renderResult();
    }

    resetBtn.addEventListener('click', () => {
      state.level = '';
      state.type = '';
      state.weight = '';
      renderAll();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    renderAll();
  </script>
</body>
</html>
