<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>極簡心智圖</title>
  <style>
    :root{
      --bg:#f5f8fc;--bg2:#fbfdff;--grid:rgba(148,163,184,.30);--panel:rgba(255,255,255,.78);--border:rgba(148,163,184,.34);
      --text:#172033;--muted:#64748b;--node:#ffffff;--node2:#f8fbff;--node-border:rgba(148,163,184,.45);
      --accent:#2563eb;--accent2:#4f46e5;--accent-soft:rgba(37,99,235,.14);--line:#3b82f6;--danger:#ef4444;
      --shadow:0 16px 40px rgba(15,23,42,.10);--card-shadow:0 9px 24px rgba(15,23,42,.10);--tool:rgba(255,255,255,.72)
    }
    body[data-theme="rose"]{--bg:#fff5f9;--bg2:#fffafd;--grid:rgba(212,20,90,.18);--accent:#d4145a;--accent2:#f43f5e;--accent-soft:rgba(212,20,90,.16);--line:#db2777}
    body[data-theme="blue"]{--bg:#f3f7ff;--bg2:#fbfdff;--grid:rgba(37,99,235,.16);--accent:#2563eb;--accent2:#4f46e5;--accent-soft:rgba(37,99,235,.16);--line:#3b82f6}
    body[data-theme="gray"]{--bg:#f3f5f8;--bg2:#fbfcfd;--grid:rgba(100,116,139,.17);--accent:#334155;--accent2:#64748b;--accent-soft:rgba(51,65,85,.14);--line:#64748b}
    body[data-theme="warm"]{--bg:#fff8ed;--bg2:#fffdf8;--grid:rgba(217,119,6,.18);--accent:#d97706;--accent2:#f97316;--accent-soft:rgba(217,119,6,.17);--line:#f59e0b}
    body[data-theme="forest"]{--bg:#f1fbf6;--bg2:#fbfffd;--grid:rgba(15,118,110,.16);--accent:#0f766e;--accent2:#16a34a;--accent-soft:rgba(15,118,110,.15);--line:#10b981}
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:"Microsoft JhengHei","Noto Sans TC",system-ui,-apple-system,BlinkMacSystemFont,sans-serif;color:var(--text);background:var(--bg)}
    body{display:flex;flex-direction:column;background:radial-gradient(circle at 8% 4%,color-mix(in srgb,var(--accent),transparent 86%) 0,transparent 330px),linear-gradient(180deg,var(--bg2),var(--bg))}
    .topbar{height:62px;display:flex;align-items:center;gap:9px;padding:9px 12px;background:linear-gradient(180deg,rgba(255,255,255,.86),rgba(255,255,255,.68));border-bottom:1px solid var(--border);box-shadow:0 10px 26px rgba(15,23,42,.06);backdrop-filter:blur(18px);z-index:40;overflow-x:auto;white-space:nowrap}
    .brand{display:flex;align-items:center;gap:9px;flex:0 0 auto;font-weight:900;letter-spacing:.06em}.brand::before{content:"";width:23px;height:23px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 8px 18px var(--accent-soft)}
    button,label.filebtn,select,input.filename{height:39px;border:1px solid var(--border);background:rgba(255,255,255,.76);border-radius:13px;color:var(--text);padding:0 13px;font-size:14px;cursor:pointer;outline:none;transition:.14s ease;backdrop-filter:blur(10px);display:inline-flex;align-items:center;justify-content:center;line-height:39px;white-space:nowrap;flex:0 0 auto}
    button:hover,label.filebtn:hover,select:hover,input.filename:hover{border-color:color-mix(in srgb,var(--accent),white 18%);box-shadow:0 8px 20px rgba(15,23,42,.10);transform:translateY(-1px);background:rgba(255,255,255,.95)}button:active,label.filebtn:active{transform:translateY(0) scale(.985)}
    button.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:white;font-weight:850;box-shadow:0 10px 22px var(--accent-soft)}button.danger{background:linear-gradient(135deg,#fb923c,#ef4444);border-color:transparent;color:white;font-weight:850;box-shadow:0 10px 22px rgba(239,68,68,.16)}button.icon{width:39px;padding:0;font-size:17px;border-radius:13px}input.filename{width:160px;cursor:text;background:rgba(255,255,255,.70)}input[type=file]{display:none}.sep{width:1px;height:28px;background:var(--border);flex:0 0 auto}.spacer{flex:1}.hint{font-size:12px;color:var(--muted);border:1px solid rgba(148,163,184,.22);border-radius:999px;padding:7px 10px;background:rgba(255,255,255,.52);flex:0 0 auto}
    .stage{position:relative;flex:1;overflow:hidden;background:linear-gradient(rgba(255,255,255,.38),rgba(255,255,255,.04)),radial-gradient(circle at 18px 18px,var(--grid) 1.12px,transparent 1.12px),linear-gradient(180deg,var(--bg2),var(--bg));background-size:auto,30px 30px,auto;touch-action:none;cursor:grab}.stage::before{content:"";position:absolute;inset:18px;border:1px solid rgba(255,255,255,.60);border-radius:26px;pointer-events:none;box-shadow:inset 0 0 60px rgba(255,255,255,.22)}.stage.panning{cursor:grabbing}
    #world{position:absolute;left:0;top:0;width:1px;height:1px;transform-origin:0 0}#links{position:absolute;left:-5000px;top:-5000px;width:10000px;height:10000px;overflow:visible;pointer-events:none;z-index:1;filter:drop-shadow(0 4px 8px rgba(15,23,42,.08))}#nodes{position:absolute;left:0;top:0;z-index:2}.map-title{position:absolute;z-index:3;min-width:250px;max-width:640px;padding:15px 28px;border-radius:23px;background:rgba(255,255,255,.88);border:1px solid var(--border);box-shadow:var(--shadow);font-size:28px;font-weight:900;text-align:center;letter-spacing:.06em;cursor:grab;user-select:none;backdrop-filter:blur(12px);touch-action:none;transform:translate(-50%,-50%)}.map-title.editing{cursor:text;user-select:text;outline:4px solid var(--accent-soft)}
    .node{position:absolute;min-width:124px;max-width:250px;padding:11px 17px;border-radius:18px;background:linear-gradient(180deg,var(--node),var(--node2));border:1px solid var(--node-border);box-shadow:var(--card-shadow);cursor:grab;user-select:none;touch-action:none;transform:translate(-50%,-50%);transition:box-shadow .14s ease,border-color .14s ease,background .14s ease,transform .14s ease;overflow:hidden}.node::before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;background:linear-gradient(180deg,var(--accent),var(--accent2));opacity:.88}.node:hover{border-color:color-mix(in srgb,var(--accent),white 18%);box-shadow:0 14px 32px rgba(15,23,42,.16);transform:translate(-50%,-50%) translateY(-1px)}.node.selected{border-color:var(--accent);box-shadow:0 0 0 5px var(--accent-soft),0 18px 40px rgba(15,23,42,.18)}.node.dragging{box-shadow:0 22px 52px rgba(15,23,42,.22)}.node.root{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border-color:transparent;font-weight:900;min-width:154px;text-align:center;box-shadow:0 18px 44px var(--accent-soft),0 10px 26px rgba(15,23,42,.18)}.node.root::before{display:none}
    .title{min-height:21px;line-height:1.38;outline:none;white-space:pre-wrap;word-break:break-word;text-align:center;font-size:15px;letter-spacing:.02em;padding-left:2px}.node:not(.root) .title{font-weight:700;color:#182235}.title[contenteditable="true"]{cursor:text;user-select:text;background:rgba(255,255,255,.80);border-radius:10px;padding:3px 6px;box-shadow:inset 0 0 0 1px rgba(148,163,184,.55)}.root .title[contenteditable="true"]{background:rgba(255,255,255,.18);box-shadow:inset 0 0 0 1px rgba(255,255,255,.38);color:white}
    body[data-shape="pill"] .node{border-radius:999px}body[data-shape="square"] .node{border-radius:10px}body[data-shape="glass"] .node{background:rgba(255,255,255,.84);backdrop-filter:blur(12px);color:#172033;border-color:rgba(215,224,236,.98)}body[data-shape="glass"] .node.root{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white}body[data-size="small"] .node{min-width:120px;font-size:14px;padding:9px 13px}body[data-size="medium"] .node{min-width:150px;font-size:15px}body[data-size="large"] .node{min-width:185px;font-size:16px;padding:13px 20px}
    .quick{position:absolute;display:none;gap:7px;z-index:30;transform:translate(-50%,0);pointer-events:auto;padding:5px;border:1px solid rgba(255,255,255,.55);background:rgba(255,255,255,.38);border-radius:16px;box-shadow:0 14px 32px rgba(15,23,42,.16);backdrop-filter:blur(14px)}.quick.show{display:flex}.qbtn{width:39px;height:39px;border-radius:12px;border:1px solid rgba(148,163,184,.46);background:var(--tool);box-shadow:0 8px 20px rgba(15,23,42,.10);display:grid;place-items:center;font-weight:950;font-size:18px;backdrop-filter:blur(12px);cursor:pointer;user-select:none;transition:.14s ease;color:#0f172a}.qbtn:hover{background:rgba(255,255,255,.96);border-color:var(--accent);transform:translateY(-2px);box-shadow:0 12px 24px rgba(15,23,42,.14)}.qbtn.child{color:white;background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent}.qbtn.sibling{color:var(--accent);font-size:23px;background:rgba(255,255,255,.78)}.qbtn.delete{color:white;background:linear-gradient(135deg,#ef4444,#dc2626);border-color:transparent}
    .status{position:absolute;left:16px;bottom:16px;background:rgba(255,255,255,.72);border:1px solid var(--border);border-radius:999px;padding:8px 13px;font-size:12px;color:var(--muted);backdrop-filter:blur(14px);z-index:20;pointer-events:none;box-shadow:0 10px 24px rgba(15,23,42,.08);opacity:0;transform:translateY(8px);transition:.2s}.status.show{opacity:1;transform:translateY(0)}.exporting .topbar,.exporting .quick,.exporting .status{display:none!important}@media(max-width:760px){.topbar{height:auto;min-height:60px;flex-wrap:wrap}.hint{display:none}.brand{width:100%}input.filename{flex:1;width:120px}.stage::before{inset:10px;border-radius:18px}.node{min-width:108px;max-width:210px;padding:10px 14px}.qbtn{width:36px;height:36px}}
  </style>
</head>
<body data-theme="rose" data-shape="round" data-size="large">
  <div class="topbar" id="topbar">
    <div class="brand">心智圖</div>
    <input class="filename" id="fileName" value="心智圖" title="檔名" />
    <button class="primary" id="addRootChild">＋ 節點</button>
    <button class="danger" id="clearAll">全刪</button>
    <button id="autoLayout">自動排列</button>
    <div class="sep"></div>
    <button id="saveJson">存 JSON</button>
    <label class="filebtn" for="loadJson">讀 JSON</label><input id="loadJson" type="file" accept="application/json,.json" />
    <button id="exportPng">匯出 PNG</button>
    <div class="sep"></div>
    <select id="themeSelect" title="主題配色"><option value="rose">玫瑰</option><option value="blue">藍</option><option value="gray">灰</option><option value="warm">暖橘</option><option value="forest">森林</option></select>
    <select id="shapeSelect" title="卡片外觀"><option value="round">圓角</option><option value="pill">膠囊</option><option value="square">方形</option><option value="glass">玻璃</option></select>
    <select id="sizeSelect" title="卡片大小"><option value="small">小</option><option value="medium">中</option><option value="large">大</option></select>
    <button class="icon" id="resetView" title="回到畫面中央">⌂</button>
    <div class="spacer"></div>
    <div class="hint">點文字修改｜Ctrl++ 同層｜Ctrl+→ 子層｜Delete 刪除</div>
  </div>
  <div class="stage" id="stage">
    <div id="world">
      <svg id="links" viewBox="-5000 -5000 10000 10000"></svg>
      <div id="mapTitle" class="map-title">心智圖標題</div>
      <div id="nodes"></div>
    </div>
    <div class="quick" id="quickTools"><div class="qbtn sibling" id="quickSibling" title="新增同層">＋</div><div class="qbtn child" id="quickChild" title="新增子層">→</div><div class="qbtn delete" id="quickDelete" title="刪除">×</div></div>
    <div class="status" id="status">已就緒</div>
  </div>
<script>
(()=>{
  const stage=document.getElementById('stage'),world=document.getElementById('world'),nodesLayer=document.getElementById('nodes'),linksSvg=document.getElementById('links'),quickTools=document.getElementById('quickTools'),statusEl=document.getElementById('status'),fileNameEl=document.getElementById('fileName'),themeSelect=document.getElementById('themeSelect'),shapeSelect=document.getElementById('shapeSelect'),sizeSelect=document.getElementById('sizeSelect'),mapTitle=document.getElementById('mapTitle');
  const STORAGE='minimal-card-mindmap-v4';
  let state=defaultData();
  let selectedId='root',scale=1,pan={x:0,y:0},drag=null,panDrag=null,titleDrag=null,editingId=null,toastTimer=null,lastMoved=false;
  function defaultData(){return{meta:{name:'心智圖',theme:'rose',shape:'round',size:'large'},title:{text:'心智圖標題',x:0,y:-210},nodes:[{id:'root',text:'中心主題',parent:null,x:0,y:0},{id:'n1',text:'想法一',parent:'root',x:290,y:-95},{id:'n2',text:'想法二',parent:'root',x:-290,y:0},{id:'n3',text:'細節',parent:'n1',x:580,y:-95}]}}
  const uid=()=> 'n'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  const node=id=>state.nodes.find(n=>n.id===id);
  const children=id=>state.nodes.filter(n=>n.parent===id);
  function descendants(id){const out=[];const walk=pid=>children(pid).forEach(c=>{out.push(c.id);walk(c.id)});walk(id);return out}
  function notify(msg){clearTimeout(toastTimer);statusEl.textContent=msg;statusEl.classList.add('show');toastTimer=setTimeout(()=>statusEl.classList.remove('show'),1500)}
  function safeName(){return(fileNameEl.value.trim()||'心智圖').replace(/[\\/:*?"<>|]/g,'_')}
  function worldPoint(clientX,clientY){const r=stage.getBoundingClientRect();return{x:(clientX-r.left-pan.x)/scale,y:(clientY-r.top-pan.y)/scale}}
  function applyTransform(){world.style.transform=`translate(${pan.x}px,${pan.y}px) scale(${scale})`;positionQuickTools()}
  function saveLocal(){state.meta.name=fileNameEl.value.trim()||'心智圖';state.meta.theme=themeSelect.value;state.meta.shape=shapeSelect.value;state.meta.size=sizeSelect.value;localStorage.setItem(STORAGE,JSON.stringify({...state,view:{scale,pan},selectedId}))}
  function applyMeta(){document.body.dataset.theme=state.meta.theme||'rose';document.body.dataset.shape=state.meta.shape||'round';document.body.dataset.size=state.meta.size||'large';themeSelect.value=state.meta.theme||'rose';shapeSelect.value=state.meta.shape||'round';sizeSelect.value=state.meta.size||'large';fileNameEl.value=state.meta.name||'心智圖'}
  function render(){applyMeta();mapTitle.textContent=state.title?.text||'心智圖標題';mapTitle.style.left=(state.title?.x||0)+'px';mapTitle.style.top=(state.title?.y||-210)+'px';nodesLayer.innerHTML='';for(const n of state.nodes){const el=document.createElement('div');el.className='node'+(n.id==='root'?' root':'')+(n.id===selectedId?' selected':'');el.dataset.id=n.id;el.style.left=n.x+'px';el.style.top=n.y+'px';const title=document.createElement('div');title.className='title';title.textContent=n.text||'未命名';title.title='雙擊文字直接修改';el.appendChild(title);nodesLayer.appendChild(el)}bindNodeEvents();drawLinks();positionQuickTools()}
  function setSelected(id){selectedId=id;document.querySelectorAll('.node').forEach(el=>el.classList.toggle('selected',el.dataset.id===id));positionQuickTools();saveLocal()}
  function clearSelection(){selectedId=null;document.querySelectorAll('.node').forEach(el=>el.classList.remove('selected'));quickTools.classList.remove('show');saveLocal()}
  function bindNodeEvents(){document.querySelectorAll('.node').forEach(el=>{const id=el.dataset.id;const title=el.querySelector('.title');el.addEventListener('pointerdown',e=>{if(editingId)return;e.stopPropagation();setSelected(id);const p=worldPoint(e.clientX,e.clientY),n=node(id);drag={id,dx:p.x-n.x,dy:p.y-n.y,startX:e.clientX,startY:e.clientY,moved:false};lastMoved=false;try{el.setPointerCapture(e.pointerId)}catch{}});el.addEventListener('click',e=>{e.stopPropagation();if(!lastMoved)setSelected(id)});el.addEventListener('dblclick',e=>{e.preventDefault();e.stopPropagation();if(!lastMoved){setSelected(id);startEdit(id)}});title.addEventListener('dblclick',e=>{e.preventDefault();e.stopPropagation();if(!lastMoved){setSelected(id);startEdit(id)}})})}
  function startEdit(id){const el=document.querySelector(`.node[data-id="${CSS.escape(id)}"] .title`),n=node(id);if(!el||!n)return;editingId=id;quickTools.classList.remove('show');el.contentEditable='true';el.focus();const range=document.createRange();range.selectNodeContents(el);const sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);const original=n.text;let done=false;const finish=(save=true)=>{if(done||editingId!==id)return;done=true;n.text=save?(el.textContent.trim()||'未命名'):original;editingId=null;el.contentEditable='false';saveLocal();render();notify('已更新文字')};el.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();finish(true)}if(e.key==='Escape'){e.preventDefault();finish(false)}};el.onblur=()=>finish(true)}
  function editMapTitle(){if(editingId)return;editingId='title';quickTools.classList.remove('show');mapTitle.classList.add('editing');mapTitle.contentEditable='true';mapTitle.focus();const range=document.createRange();range.selectNodeContents(mapTitle);const sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);const original=state.title.text;let done=false;const finish=(save=true)=>{if(done||editingId!=='title')return;done=true;state.title.text=save?(mapTitle.textContent.trim()||'心智圖標題'):original;editingId=null;mapTitle.contentEditable='false';mapTitle.classList.remove('editing');saveLocal();render();notify('已更新標題')};mapTitle.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();finish(true)}if(e.key==='Escape'){e.preventDefault();finish(false)}};mapTitle.onblur=()=>finish(true)}
  function drawLinks(){linksSvg.innerHTML='';const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');const marker=document.createElementNS('http://www.w3.org/2000/svg','marker');marker.setAttribute('id','arrow');marker.setAttribute('viewBox','0 0 10 10');marker.setAttribute('refX','9');marker.setAttribute('refY','5');marker.setAttribute('markerWidth','6');marker.setAttribute('markerHeight','6');marker.setAttribute('orient','auto-start-reverse');const mp=document.createElementNS('http://www.w3.org/2000/svg','path');mp.setAttribute('d','M0 0 L10 5 L0 10 z');mp.setAttribute('fill','var(--line)');marker.appendChild(mp);defs.appendChild(marker);linksSvg.appendChild(defs);for(const n of state.nodes){if(!n.parent)continue;const p=node(n.parent);if(!p)continue;const x1=p.x,y1=p.y,x2=n.x,y2=n.y;const dx=Math.max(78,Math.abs(x2-x1)*.45);const c1=x1+(x2>=x1?dx:-dx),c2=x2-(x2>=x1?dx:-dx);const path=document.createElementNS('http://www.w3.org/2000/svg','path');path.setAttribute('d',`M ${x1} ${y1} C ${c1} ${y1}, ${c2} ${y2}, ${x2} ${y2}`);path.setAttribute('fill','none');path.setAttribute('stroke','var(--line)');path.setAttribute('stroke-width',n.parent==='root'?'3.2':'2.4');path.setAttribute('stroke-linecap','round');path.setAttribute('opacity',n.parent==='root'?'.88':'.72');path.setAttribute('marker-end','url(#arrow)');linksSvg.appendChild(path)}}
  function positionQuickTools(){const n=node(selectedId);if(!n||editingId){quickTools.classList.remove('show');return}const el=document.querySelector(`.node[data-id="${CSS.escape(selectedId)}"]`);if(!el){quickTools.classList.remove('show');return}quickTools.classList.add('show');const sr=stage.getBoundingClientRect(),nr=el.getBoundingClientRect(),qw=quickTools.offsetWidth||150,qh=quickTools.offsetHeight||54,margin=10;let left=nr.left-sr.left+nr.width/2;let top=nr.bottom-sr.top+12;left=Math.max(margin+qw/2,Math.min(sr.width-margin-qw/2,left));if(top+qh>sr.height-margin)top=Math.max(margin,nr.top-sr.top-qh-12);quickTools.style.left=left+'px';quickTools.style.top=top+'px'}
  function addChild(parentId=selectedId||'root'){const p=node(parentId)||node('root');if(!p)return;const dir=(p.x<0&&p.id!=='root')?-1:1,count=children(p.id).length,id=uid();state.nodes.push({id,text:'新節點',parent:p.id,x:p.x+dir*280,y:p.y+(count-.5)*90});selectedId=id;saveLocal();render();setTimeout(()=>startEdit(id),30);notify('已新增子層')}
  function addSibling(){const s=node(selectedId);if(!s){addChild('root');return}if(!s.parent){notify('中心主題不能新增同層，已新增子層');addChild(s.id);return}const id=uid();state.nodes.push({id,text:'新節點',parent:s.parent,x:s.x,y:s.y+92});selectedId=id;saveLocal();render();setTimeout(()=>startEdit(id),30);notify('已新增同層')}
  function deleteSelected(){const n=node(selectedId);if(!n)return;if(!n.parent){notify('中心主題不能刪除');return}if(!confirm('確定刪除此節點與所有子節點？'))return;const ids=new Set([selectedId,...descendants(selectedId)]);state.nodes=state.nodes.filter(x=>!ids.has(x.id));selectedId=n.parent;saveLocal();render();notify('已刪除節點')}
  function clearAll(){if(!confirm('確定要清空全部節點嗎？'))return;state.nodes=[{id:'root',text:'中心主題',parent:null,x:0,y:0}];selectedId='root';saveLocal();render();centerView();notify('已清空並保留中心主題')}
  function autoLayout(){const root=state.nodes.find(n=>!n.parent)||state.nodes[0];if(!root)return;root.x=0;root.y=0;const kids=children(root.id),right=[],left=[];kids.forEach((c,i)=>(i%2===0?right:left).push(c));const sub=new Map();function measure(id){const cs=children(id);if(!cs.length){sub.set(id,1);return 1}const total=cs.reduce((s,c)=>s+measure(c.id),0);sub.set(id,Math.max(1,total));return sub.get(id)}measure(root.id);function placeGroup(list,side){const row=104,gap=290,total=list.reduce((s,n)=>s+(sub.get(n.id)||1),0);let y=-((total-1)*row)/2;list.forEach(n=>{const u=sub.get(n.id)||1;place(n.id,side,1,y+(u-1)*row/2,gap,row);y+=u*row})}function place(id,side,depth,y,gap,row){const n=node(id);n.x=side*depth*gap;n.y=Math.round(y);const cs=children(id);const total=cs.reduce((s,c)=>s+(sub.get(c.id)||1),0);let cy=y-((total-1)*row)/2;cs.forEach(c=>{const u=sub.get(c.id)||1;place(c.id,side,depth+1,cy+(u-1)*row/2,gap,row);cy+=u*row})}placeGroup(right,1);placeGroup(left,-1);selectedId=root.id;saveLocal();render();centerView();notify('已自動排列')}
  function centerView(){const r=stage.getBoundingClientRect();scale=1;const n=node(selectedId)||node('root');pan.x=r.width/2-(n?.x||0)*scale;pan.y=r.height/2-(n?.y||0)*scale;applyTransform();saveLocal()}
  function getBounds(){const xs=state.nodes.map(n=>n.x),ys=state.nodes.map(n=>n.y);xs.push(state.title.x);ys.push(state.title.y);const minX=Math.min(...xs)-180,maxX=Math.max(...xs)+180,minY=Math.min(...ys)-120,maxY=Math.max(...ys)+120;return{minX,maxX,minY,maxY,w:maxX-minX,h:maxY-minY}}
  function themeColors(){const s=getComputedStyle(document.body);return{accent:s.getPropertyValue('--accent').trim(),accent2:s.getPropertyValue('--accent2').trim(),line:s.getPropertyValue('--line').trim(),soft:s.getPropertyValue('--bg').trim(),ink:'#172033'}}
  function roundedRect(ctx,x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
  function exportPng(){quickTools.classList.remove('show');const b=getBounds(),pad=90,ratio=2,outW=Math.ceil(b.w+pad*2),outH=Math.ceil(b.h+pad*2),c=document.createElement('canvas');c.width=outW*ratio;c.height=outH*ratio;const ctx=c.getContext('2d'),colors=themeColors(),ox=pad-b.minX,oy=pad-b.minY;ctx.scale(ratio,ratio);const grad=ctx.createLinearGradient(0,0,0,outH);grad.addColorStop(0,'#fff');grad.addColorStop(1,colors.soft);ctx.fillStyle=grad;ctx.fillRect(0,0,outW,outH);ctx.fillStyle='rgba(148,163,184,.18)';for(let x=18;x<outW;x+=30)for(let y=18;y<outH;y+=30){ctx.beginPath();ctx.arc(x,y,1.1,0,Math.PI*2);ctx.fill()}ctx.lineCap='round';ctx.lineJoin='round';for(const n of state.nodes){if(!n.parent)continue;const p=node(n.parent);if(!p)continue;const x1=ox+p.x,y1=oy+p.y,x2=ox+n.x,y2=oy+n.y,dx=Math.max(78,Math.abs(x2-x1)*.45);ctx.beginPath();ctx.moveTo(x1,y1);ctx.bezierCurveTo(x1+(x2>=x1?dx:-dx),y1,x2-(x2>=x1?dx:-dx),y2,x2,y2);ctx.strokeStyle=n.parent==='root'?colors.line:'rgba(100,116,139,.72)';ctx.lineWidth=n.parent==='root'?3.2:2.4;ctx.stroke()}state.nodes.forEach(n=>drawExportNode(ctx,n,ox+n.x,oy+n.y,colors));drawExportTitle(ctx,ox+state.title.x,oy+state.title.y,colors);c.toBlob(blob=>{if(!blob){notify('匯出失敗');return}downloadBlob(safeName()+'.png',blob);notify('已匯出 PNG')},'image/png')}
  function nodeDim(){const size=document.body.dataset.size;return size==='small'?{w:136,h:42,font:14}:size==='medium'?{w:166,h:48,font:15}:{w:205,h:58,font:16}}
  function drawExportNode(ctx,n,cx,cy,colors){const d=nodeDim(),isRoot=!n.parent,shape=document.body.dataset.shape;let r=shape==='square'?10:shape==='pill'?d.h/2:18;ctx.save();ctx.shadowColor='rgba(15,23,42,.12)';ctx.shadowBlur=18;ctx.shadowOffsetY=8;const x=cx-d.w/2,y=cy-d.h/2;if(isRoot){const g=ctx.createLinearGradient(x,y,x+d.w,y+d.h);g.addColorStop(0,colors.accent);g.addColorStop(1,colors.accent2);ctx.fillStyle=g;ctx.strokeStyle='transparent'}else{ctx.fillStyle=shape==='glass'?'rgba(255,255,255,.86)':'#fff';ctx.strokeStyle='rgba(148,163,184,.45)'}roundedRect(ctx,x,y,d.w,d.h,r);ctx.fill();ctx.shadowColor='transparent';ctx.lineWidth=1.2;ctx.stroke();if(!isRoot){ctx.fillStyle=colors.accent;roundedRect(ctx,x,y,6,d.h,r);ctx.fill()}ctx.fillStyle=isRoot?'#fff':colors.ink;ctx.font=`800 ${d.font}px Microsoft JhengHei, Noto Sans TC, sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(n.text||'未命名',cx,cy);ctx.restore()}
  function drawExportTitle(ctx,cx,cy,colors){const text=state.title.text||'心智圖標題',w=Math.max(250,ctx.measureText(text).width+70),h=66,x=cx-w/2,y=cy-h/2;ctx.save();ctx.shadowColor='rgba(15,23,42,.10)';ctx.shadowBlur=24;ctx.shadowOffsetY=10;ctx.fillStyle='rgba(255,255,255,.90)';ctx.strokeStyle='rgba(148,163,184,.36)';roundedRect(ctx,x,y,w,h,23);ctx.fill();ctx.shadowColor='transparent';ctx.stroke();ctx.fillStyle=colors.ink;ctx.font='900 28px Microsoft JhengHei, Noto Sans TC, sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(text,cx,cy);ctx.restore()}
  function downloadBlob(name,blob){const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url)}
  function saveJson(){state.meta.name=safeName();state.meta.theme=themeSelect.value;state.meta.shape=shapeSelect.value;state.meta.size=sizeSelect.value;state.meta.savedAt=new Date().toISOString();downloadBlob(safeName()+'.json',new Blob([JSON.stringify({...state,view:{scale,pan}},null,2)],{type:'application/json;charset=utf-8'}));notify('已存 JSON')}
  function loadJsonFile(file){const reader=new FileReader();reader.onload=()=>{try{const obj=JSON.parse(reader.result);if(!Array.isArray(obj.nodes))throw Error('JSON 格式不正確');state={meta:{...defaultData().meta,...(obj.meta||{})},title:{...defaultData().title,...(obj.title||{})},nodes:obj.nodes.map(n=>({id:n.id||uid(),text:n.text||n.topic||'未命名',parent:n.parent||null,x:Number(n.x)||0,y:Number(n.y)||0}))};scale=obj.view?.scale||1;pan=obj.view?.pan||{x:0,y:0};selectedId=obj.selectedId||state.nodes.find(n=>n.id==='root')?.id||state.nodes[0]?.id;saveLocal();render();notify('已讀 JSON')}catch(err){notify('讀檔失敗：'+err.message)}};reader.readAsText(file,'utf-8')}
  stage.addEventListener('pointerdown',e=>{if(editingId||e.button!==0)return;if(e.target.closest('.node')||e.target.closest('.quick')||e.target.closest('.map-title'))return;clearSelection();panDrag={x:e.clientX,y:e.clientY,px:pan.x,py:pan.y};stage.classList.add('panning');try{stage.setPointerCapture(e.pointerId)}catch{}})
  stage.addEventListener('pointermove',e=>{if(drag){const p=worldPoint(e.clientX,e.clientY),n=node(drag.id);if(!n)return;n.x=Math.round(p.x-drag.dx);n.y=Math.round(p.y-drag.dy);if(Math.hypot(e.clientX-drag.startX,e.clientY-drag.startY)>5){drag.moved=true;lastMoved=true}const el=document.querySelector(`.node[data-id="${CSS.escape(drag.id)}"]`);if(el){el.style.left=n.x+'px';el.style.top=n.y+'px';el.classList.add('dragging')}drawLinks();positionQuickTools();return}if(titleDrag){const p=worldPoint(e.clientX,e.clientY);state.title.x=Math.round(p.x-titleDrag.dx);state.title.y=Math.round(p.y-titleDrag.dy);mapTitle.style.left=state.title.x+'px';mapTitle.style.top=state.title.y+'px';return}if(panDrag){pan.x=panDrag.px+(e.clientX-panDrag.x);pan.y=panDrag.py+(e.clientY-panDrag.y);applyTransform()}})
  function endPointer(){if(drag){document.querySelector(`.node[data-id="${CSS.escape(drag.id)}"]`)?.classList.remove('dragging');if(drag.moved)notify('已微調位置');saveLocal()}drag=null;if(titleDrag){saveLocal();notify('已移動標題')}titleDrag=null;if(panDrag){saveLocal()}panDrag=null;stage.classList.remove('panning')}
  window.addEventListener('pointerup',endPointer);window.addEventListener('pointercancel',endPointer);window.addEventListener('blur',endPointer)
  stage.addEventListener('wheel',e=>{e.preventDefault();const before=worldPoint(e.clientX,e.clientY),factor=e.deltaY<0?1.08:.92;scale=Math.min(2.6,Math.max(.35,scale*factor));const r=stage.getBoundingClientRect();pan.x=e.clientX-r.left-before.x*scale;pan.y=e.clientY-r.top-before.y*scale;applyTransform();saveLocal()},{passive:false})
  mapTitle.addEventListener('pointerdown',e=>{if(editingId||e.button!==0)return;e.stopPropagation();const p=worldPoint(e.clientX,e.clientY);titleDrag={dx:p.x-state.title.x,dy:p.y-state.title.y};try{mapTitle.setPointerCapture(e.pointerId)}catch{}});mapTitle.addEventListener('click',e=>{e.stopPropagation();if(!titleDrag)editMapTitle()})
  document.getElementById('quickChild').onclick=e=>{e.stopPropagation();addChild()};document.getElementById('quickSibling').onclick=e=>{e.stopPropagation();addSibling()};document.getElementById('quickDelete').onclick=e=>{e.stopPropagation();deleteSelected()};document.getElementById('addRootChild').onclick=()=>addChild(selectedId||'root');document.getElementById('clearAll').onclick=clearAll;document.getElementById('autoLayout').onclick=autoLayout;document.getElementById('saveJson').onclick=saveJson;document.getElementById('exportPng').onclick=exportPng;document.getElementById('resetView').onclick=centerView;document.getElementById('loadJson').onchange=e=>{const f=e.target.files?.[0];if(f)loadJsonFile(f);e.target.value=''};themeSelect.onchange=()=>{state.meta.theme=themeSelect.value;saveLocal();render()};shapeSelect.onchange=()=>{state.meta.shape=shapeSelect.value;saveLocal();render()};sizeSelect.onchange=()=>{state.meta.size=sizeSelect.value;saveLocal();render()};fileNameEl.oninput=saveLocal;
  document.addEventListener('keydown',e=>{if(editingId)return;const tag=(document.activeElement?.tagName||'').toLowerCase();if(['input','select','textarea'].includes(tag))return;if(e.key==='Delete'){e.preventDefault();deleteSelected();return}if((e.ctrlKey||e.metaKey)&&(e.key==='+'||e.key==='='||e.code==='NumpadAdd')){e.preventDefault();addSibling();return}if((e.ctrlKey||e.metaKey)&&e.key==='ArrowRight'){e.preventDefault();addChild(selectedId||'root');return}})
  window.addEventListener('resize',()=>applyTransform())
  ;(function init(){const raw=localStorage.getItem(STORAGE);if(raw){try{const obj=JSON.parse(raw);if(Array.isArray(obj.nodes)){state={meta:{...defaultData().meta,...(obj.meta||{})},title:{...defaultData().title,...(obj.title||{})},nodes:obj.nodes};scale=obj.view?.scale||1;pan=obj.view?.pan||{x:0,y:0};selectedId=obj.selectedId||state.nodes.find(n=>n.id==='root')?.id||state.nodes[0]?.id}}catch{}}render();if(!pan.x&&!pan.y)centerView();else applyTransform()})()
})();
</script>
